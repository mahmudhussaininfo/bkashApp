<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css"
      integrity="sha512-5A8nwdMOWrSz20fDsjczgUidUBR8liPYU+WymTZP1lmY9G6Oc7HlZv156XqnsgNUzTyMefFTcsFH/tnJE/+xBg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <button class="payment-button" data-bs-toggle="modal"
    data-bs-target="#create_trx_modal"><i class="fa fa-plus"></i></button>

    <div class="main-wrap">
      <div class="brand">
        <img
          src="https://freelogopng.com/images/all_img/1656234841bkash-icon-png.png"
          alt=""
        />
        <h3>bKash Transaction App</h3>
      </div>
      <div class="user">
        <img
          src="https://scontent.fdac5-2.fna.fbcdn.net/v/t39.30808-1/333936078_1361956414655948_834213367116914942_n.jpg?stp=c4.48.545.546a_dst-jpg_s320x320_tt6&_nc_cat=102&ccb=1-7&_nc_sid=e99d92&_nc_ohc=AYcCqHOm9YkQ7kNvgFZgcB5&_nc_zt=24&_nc_ht=scontent.fdac5-2.fna&_nc_gid=AoU6hBZ2RW_cybF33GF1VPN&oh=00_AYB2AD67hwpaL1s7RZc2INydLgCbG130HIZ7nURDaxZmHw&oe=67AF84D7"
          alt=""
        />
        <div class="info">
          <h4>Mr. Mamu</h4>
          <div id="main_balance" class="balance">12000 BDT</div>
        </div>
      </div>
      <div class="transaction-area">
        <div class="search">
          <div class="search-trans">
            <form action="">
              <button><i class="fa fa-search"></i></button>
              <input type="text" placeholder="TrxID বা নাম্বার দিয়ে খুঁজুন " />
            </form>
          </div>
          <div class="search-filter">
            <button><i class="fa fa-bank"></i></button>
          </div>
        </div>
        <div id="transection_list" class="transaction-list"></div>
      </div>
    </div>

    <!-- modal -->
    <div class="modal fade" id="create_trx_modal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-body">
            <button data-bs-dismiss="modal" class="btn-close d-none"></button>
            <h2>Create a Transaction</h2>
            <hr />
            <form id="create_transaction_form">
              <div class="my-3">
                <label> Phone </label>
                <input type="text" name="phone" class="form-control" />
              </div>
              <div class="my-3">
                <label> Amount </label>
                <input type="text" name="amount" class="form-control" />
              </div>
              <div class="my-3">
                <label> Type </label>
                <select class="form-control" name="type" id="">
                  <option value="Cash In">Cash In</option>
                  <option value="Cash Out">Cash Out</option>
                  <option value="Send Money">Send Money</option>
                  <option value="Make Payment">Make Payment</option>
                  <option value="Mobile Recharge">Mobile Recharge</option>
                </select>
              </div>
              <div class="my-3">
                <label> Name </label>
                <input type="text" name="name" class="form-control" />
              </div>
              <div class="my-3">
                <label> Photo </label>
                <input type="text" name="photo" class="form-control" />
              </div>
              <div class="my-3">
                <button type="submit" class="btn btn-success w-100">
                  Create new Transaction
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../app/data.js"></script>
    <script src="../app/function.js"></script>
    <script src="../app/main.js"></script>
  </body>
</html>
